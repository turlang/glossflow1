# Docker Compose para rodar a API em um ambiente padronizado.
# Antes de usar, crie backend/.env a partir de backend/.env.example.
# O frontend pode ser executado separadamente com Vite ou hospedado na Vercel.
services:
  api:
    # Usa o Dockerfile da raiz para instalar dependências, gerar Prisma Client e compilar TypeScript.
    build: .
    container_name: glossflow-api
    env_file:
      - ./backend/.env
    ports:
      - "3333:3333"
    # Healthcheck usado por Docker/Render para verificar se a API está viva.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3333/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
